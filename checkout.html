<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán - SillyCat Sleepwear</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            max-width:700px;
            margin:40px auto;
            padding:20px;
        }

        h1{
            text-align:center;
        }

        input, textarea{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ddd;
            border-radius:8px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            background:#ff7aa2;
            color:white;
            border:none;
            padding:15px;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            opacity:0.9;
        }

        #total{
            font-size:22px;
            color:#e91e63;
            font-weight:bold;
            margin:20px 0;
        }
    </style>
</head>
<body>

<h1>🛒 Thanh toán</h1>

<div id="total"></div>

<input type="text" id="name" placeholder="Họ và tên">

<input type="text" id="phone" placeholder="Số điện thoại">

<textarea id="address"
placeholder="Địa chỉ nhận hàng"></textarea>

<textarea id="note"
placeholder="Ghi chú (nếu có)"></textarea>

<button onclick="orderZalo()">
Đặt hàng qua Zalo
</button>

<script>

const cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;

cart.forEach(item=>{
    total += item.price;
});

document.getElementById("total").innerHTML =
"Tổng tiền: " +
total.toLocaleString("vi-VN") +
" đ";

function orderZalo() {

    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const address = document.getElementById("address").value;
    const note = document.getElementById("note").value;

    const cart = JSON.parse(localStorage.getItem("cart")) || [];

    let products = "";
    let total = 0;

    cart.forEach(item => {
        products += item.name + " - " +
                    item.price.toLocaleString("vi-VN") + "đ\n";

        total += item.price;
    });

const message = `
ĐƠN HÀNG MỚI

Khách hàng: ${name}

SĐT: ${phone}

Địa chỉ: ${address}

Sản phẩm:
${products}

Tổng tiền:
${total.toLocaleString("vi-VN")} đ

Ghi chú:
${note}
`;

navigator.clipboard.writeText(message)
.then(() => {
    alert(
        "Thông tin đơn hàng đã được sao chép!\n\n" +
        "Sau khi Zalo mở ra, hãy nhấn Ctrl + V để gửi cho shop."
    );

    window.open("https://zalo.me/84399597209", "_blank");
})
.catch(err => {
    console.error(err);
    alert("Không thể sao chép đơn hàng!");
});
}

</script>

</body>
</html>
